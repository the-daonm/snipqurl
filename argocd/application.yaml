apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snipqurl
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/the-daonm/snipqurl
    targetRevision: HEAD
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: snipqurl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
