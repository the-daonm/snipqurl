---
- name: Ensure argocd namespace exists
  kubernetes.core.k8s:
    name: argocd
    kind: Namespace
    state: present

- name: Install Argo CD
  kubernetes.core.k8s:
    state: present
    src: https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
    namespace: argocd

- name: Wait for Argo CD server to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: argocd-server
    namespace: argocd
  register: argocd_server
  until:
    - argocd_server.resources is defined
    - argocd_server.resources | length > 0
    - argocd_server.resources[0].status.readyReplicas is defined
    - argocd_server.resources[0].status.readyReplicas >= 1
  retries: 20
  delay: 10

- name: Apply snipqurl Application to Argo CD
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', playbook_dir + '/../../argocd/application.yaml') | from_yaml }}"
