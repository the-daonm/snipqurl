---
- name: Install dependencies for Kubernetes modules
  become: true
  ansible.builtin.package:
    name:
      - python3-pip
      - python3-kubernetes
    state: present

- name: Create temporary directory for manifests
  ansible.builtin.file:
    path: /tmp/snipqurl-k8s
    state: directory
    mode: "0755"

- name: Copy Kubernetes manifests to master node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../k8s/"
    dest: /tmp/snipqurl-k8s/
    mode: "0644"

- name: Ensure the namespace exists
  kubernetes.core.k8s:
    src: /tmp/snipqurl-k8s/namespace.yaml
    state: present

- name: Wait for cert-manager webhook to be ready
  ansible.builtin.command:
    cmd: kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
  changed_when: false

- name: Apply ClusterIssuer
  kubernetes.core.k8s:
    src: /tmp/snipqurl-k8s/cluster-issuer.yaml
    state: present

- name: Apply ConfigMap
  kubernetes.core.k8s:
    src: /tmp/snipqurl-k8s/configmap.yaml
    state: present

- name: Check if secret.yaml exists on master
  ansible.builtin.stat:
    path: /tmp/snipqurl-k8s/secret.yaml
  register: deploy_remote_secret_file

- name: Apply Secret (if exists)
  kubernetes.core.k8s:
    src: /tmp/snipqurl-k8s/secret.yaml
    state: present
  when: deploy_remote_secret_file.stat.exists

- name: Create Secret from variables (if file doesn't exist)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: snipqurl-secret
        namespace: snipqurl
      type: Opaque
      stringData:
        DB_PASSWORD: "{{ db_password }}"
        POSTGRES_PASSWORD: "{{ db_password }}"
  when:
    - not deploy_remote_secret_file.stat.exists
    - db_password is defined

- name: Find Postgres manifests
  ansible.builtin.find:
    paths: /tmp/snipqurl-k8s/postgres/
    patterns: "*.yaml"
  register: deploy_postgres_files

- name: Delete old migration job
  kubernetes.core.k8s:
    name: snipqurl-migration
    namespace: snipqurl
    kind: Job
    state: absent

- name: Apply Postgres manifests
  kubernetes.core.k8s:
    src: "{{ item.path }}"
    state: present
  loop: "{{ deploy_postgres_files.files | sort(attribute='path') }}"

- name: Find Application manifests
  ansible.builtin.find:
    paths: /tmp/snipqurl-k8s/app/
    patterns: "*.yaml"
  register: deploy_app_files

- name: Apply Application manifests (Deployment with image override)
  kubernetes.core.k8s:
    definition: "{{ lookup('file', item.path) | from_yaml | combine(image_override, recursive=True) }}"
    state: present
  vars:
    image_override:
      spec:
        template:
          spec:
            containers:
              - name: snipqurl
                image: "{{ image_name }}:{{ image_tag | default('latest') }}"
  loop: "{{ deploy_app_files.files | sort(attribute='path') }}"
  when: "'deployment.yaml' in item.path"

- name: Apply other Application manifests
  kubernetes.core.k8s:
    src: "{{ item.path }}"
    state: present
  loop: "{{ deploy_app_files.files | sort(attribute='path') }}"
  when: "'deployment.yaml' not in item.path"

- name: Clean up temporary manifests
  ansible.builtin.file:
    path: /tmp/snipqurl-k8s
    state: absent
