apiVersion: batch/v1
kind: Job
metadata:
  name: snipqurl-migration
  namespace: snipqurl
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      containers:
      - name: migration
        image: postgres:16-alpine
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            export PGPASSWORD="$DB_PASSWORD"
            echo "Running migrations..."
            for f in $(ls /migrations/*.up.sql | sort); do
              echo "Applying $f..."
              psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" -f "$f"
            done
            echo "Migrations complete."
        envFrom:
          - configMapRef:
              name: snipqurl-configmap
          - secretRef:
              name: snipqurl-secret
        volumeMounts:
        - name: migrations
          mountPath: /migrations
      restartPolicy: OnFailure
      volumes:
      - name: migrations
        configMap:
          name: snipqurl-migrations-cm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snipqurl-migrations-cm
  namespace: snipqurl
data:
  000001_create_urls_table.up.sql: |
    CREATE TABLE IF NOT EXISTS urls (
      id bigserial primary key,
      original_url text not null,
      short_code varchar(10) unique,
      clicks integer default 0,
      created_at timestamp default now()
    );
  000002_add_alias_and_expiration.up.sql: |
    -- Alter short_code length and add expires_at column
    ALTER TABLE urls ALTER COLUMN short_code TYPE varchar(30);
    ALTER TABLE urls ADD COLUMN IF NOT EXISTS expires_at timestamp;
